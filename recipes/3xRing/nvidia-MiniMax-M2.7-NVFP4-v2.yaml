recipe_version: "2"
model: nvidia/MiniMax-M2.7-NVFP4
runtime: vllm

# this recipe is specific to multi-node, so we set min/max nodes
min_nodes: 2
# max_nodes: 3

# using the Spark Arena eugr nightly container will signal sparkrun to use @eugr's latest release
container: ghcr.io/spark-arena/dgx-vllm-eugr-nightly-tf5:latest

metadata:
  description: Recipe for nvidia/MiniMax-M2.7-NVFP4 to run on 2 nodes

build_args:
  - --tf5

defaults:
  port: 8000
  host: 0.0.0.0
  pipeline_parallel: 3
  tensor_parallel: 1
  gpu_memory_utilization: 0.7
  max_num_batched_tokens: 2048
  max_num_seqs: 10
  load_format: instanttensor

# Environment variables
env:
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  VLLM_MARLIN_USE_ATOMIC_ADD: 1

# The vLLM serve command template
command: |
  vllm serve {model} \
    --max-num-seqs {max_num_seqs} \
    --kv-cache-dtype {kv_cache_dtype} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --port {port} \
    --host {host} \
    --enable-prefix-caching \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --load-format {load_format} \
    -tp {tensor_parallel} \
    -pp {pipeline_parallel}