# Recipe: Sehyo/Qwen3.5-122B-A10B-NVFP4
# Sehyo/Qwen3.5-122B-A10B-NVFP4 model in online NVFP4 quantization

recipe_version: "1"
name: Sehyo/Qwen3.5-122B-A10B-NVFP4
description: vLLM serving Sehyo/Qwen3.5-122B-A10B-NVFP4

# HuggingFace model to download (optional, for --download-model)
model: Sehyo/Qwen3.5-122B-A10B-NVFP4

# Only cluster is supported
cluster_only: true
solo_only: false

# Container image to use
container: vllm-node-tf5

build_args:
  - --tf5

# Default settings (can be overridden via CLI)
defaults:
  port: 8000
  host: 0.0.0.0
  # max_model_len: 262144
  # max_num_seq: 256
  # max_num_batched_tokens: 2048
  tensor_parallel: 1
  pipeline_parallel: 3
  gpu_memory_utilization: 0.80
  quantization: compressed-tensors
  kv_cache_dtype: fp8
  load_format: instanttensor
  max_num_batched_tokens: 16384
  max_num_seq: 10

# Environment variables
env:
  # VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: 0

# The vLLM serve command template
command: |
  vllm serve Sehyo/Qwen3.5-122B-A10B-NVFP4  \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --port {port} \
    --host {host} \
    --enable-prefix-caching \
    -tp {tensor_parallel}  \
    -pp {pipeline_parallel}  \
    --quantization {quantization} \
    --kv-cache-dtype {kv_cache_dtype} \
    --load-format {load_format} \
    --max_num_batched_tokens {max_num_batched_tokens} \
    --max_num_seq {max_num_seq} \
    --distributed-executor-backend ray
