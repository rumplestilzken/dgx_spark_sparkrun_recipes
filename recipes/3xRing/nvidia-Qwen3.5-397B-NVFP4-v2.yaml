recipe_version: "2"
model: nvidia/Qwen3.5-397B-A17B-NVFP4 
runtime: vllm

# this recipe is specific to 3-node mesh, so we set min/max nodes to 3
min_nodes: 3
max_nodes: 3

# using the Spark Arena eugr nightly container will signal sparkrun to use @eugr's latest release
container: ghcr.io/spark-arena/dgx-vllm-eugr-nightly-tf5:latest

metadata:
  description: Recipe for Qwen3.5-397B-A17B-NVFP4 to run on 3-node mesh in pipeline-parallel mode

build_args:
  - --tf5

# Mod required to fix ROPE syntax error
mods:
  - mods/fix-qwen3.5-chat-template

defaults:
  port: 8000
  host: 0.0.0.0
  pipeline_parallel: 3
  tensor_parallel: 1
  gpu_memory_utilization: 0.8520
  max_model_len: 262144
  max_num_batched_tokens: 4288
  max_num_seqs: 10
  kv_cache_dtype: fp8
  tool_call_parser: qwen3_coder
  reasoning_parser: qwen3
  load_format: instanttensor

# Environment variables
env:
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  VLLM_MARLIN_USE_ATOMIC_ADD: 1
  VLLM_DISTRIBUTED_EXECUTOR_BACKEND: "ray"


# The vLLM serve command template
command: |
  vllm serve {model} \
    --max-num-seqs {max_num_seqs} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --port {port} \
    --host {host} \
    --enable-prefix-caching \
    --enable-auto-tool-choice \
    --tool-call-parser {tool_call_parser} \
    --reasoning-parser {reasoning_parser} \
    --chat-template unsloth.jinja \
    --load-format {load_format} \
    -tp {tensor_parallel} \
    -pp {pipeline_parallel} \
    --distributed-executor-backend ray 
