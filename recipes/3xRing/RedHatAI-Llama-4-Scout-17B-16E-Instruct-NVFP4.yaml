# Recipe: Llama-4-Scout-17B-16E-Instruct-NVFP4
# RedHatAI/Llama-4-Scout-17B-16E-Instruct-NVFP4 model in online NVFP4 quantization

recipe_version: "1"
name: Llama-4-Scout-17B-16E-Instruct-NVFP4
description: vLLM serving RedHatAI/Llama-4-Scout-17B-16E-Instruct-NVFP4 with 1M context (per node)

# HuggingFace model to download (optional, for --download-model)
model: RedHatAI/Llama-4-Scout-17B-16E-Instruct-NVFP4

# Only cluster is supported
cluster_only: true
solo_only: false

# Container image to use
container: ghcr.io/spark-arena/dgx-vllm-eugr-nightly-tf5:latest

build_args:
  - --tf5

# Default settings (can be overridden via CLI)
defaults:
  port: 8000
  host: 0.0.0.0
  max_model_len: 1000000
  # max_num_seq: 256
  # max_num_batched_tokens: 2048
  tensor_parallel: 1
  pipeline_parallel: 3
  gpu_memory_utilization: 0.70
  # load_format: instanttensor
  load_format: instanttensor
  max_num_batched_tokens: 16384
  max_num_seq: 10

# Environment variables
env:
  HF_HUB_OFFLINE: 1
  # VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: 0

# The vLLM serve command template
command: |
  vllm serve {model}  \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --max-model-len {max_model_len} \
    --port {port} \
    --host {host} \
    --enable-prefix-caching \
    -tp {tensor_parallel}  \
    -pp {pipeline_parallel} \
    --distributed-executor-backend ray
