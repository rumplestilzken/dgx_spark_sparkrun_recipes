# Recipe: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4
# nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4 model in online NVFP4 quantization

recipe_version: "1"
name: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4
description: vLLM serving nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4

# HuggingFace model to download (optional, for --download-model)
model: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4

# Only cluster is supported
cluster_only: true

# Container image to use
container: vllm-node-tf5

build_args:
  - --tf5

mods:
  - mods/nemotron-super

# Default settings (can be overridden via CLI)
defaults:
  port: 8000
  host: 0.0.0.0
  # max_model_len: 262144
  # max_num_seq: 256
  # max_num_batched_tokens: 2048
  tensor_parallel: 2
  gpu_memory_utilization: 0.8 
  # quantization: compressed-tensors
  # kv_cache_dtype: fp8
  load_format: instanttensor
  max_num_batched_tokens: 16384
  max_num_seq: 10

# Environment variables
env:
  OMP_NUM_THREADS: '4'
  CUDA_MANAGED_FORCE_DEVICE_ALLOC: '1'
  PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: '1'
  VLLM_USE_FLASHINFER_MOE_FP4: '0'
  VLLM_MARLIN_USE_ATOMIC_ADD: '1'
  VLLM_NVFP4_GEMM_BACKEND: marlin

# The vLLM serve command template
command: |
  vllm serve nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4  \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --port {port} \
    --host {host} \
    --enable-prefix-caching \
    -tp {tensor_parallel}  \
    --max_num_batched_tokens {max_num_batched_tokens} \
    --max_num_seq {max_num_seq} \
    --load-format {load_format} \
    --speculative-config '{"method": "ngram", "num_speculative_tokens": 5}' \
    --distributed-executor-backend ray
